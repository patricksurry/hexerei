hexmap: "1.0"

metadata:
  id: battle-for-moscow
  version: "1.1"
  title: "Battle for Moscow"
  description: "Introductory wargame representing the German advance on Moscow, 1941."
  designer: "Frank Chadwick"
  publisher: "GDW"
  date: "1986"
  source:
    url: "https://grognard.com/bfm/game.html"
    notes: "Based on the original GDW map and rules. Grid size 14x11."

layout:
  orientation: flat-up
  all: "0101 1401 1411 0111 ! - 0211, 0411, 0611, 0811, 1011, 1211, 1411"
  coordinates:
    label: CCRR
    origin: top-left
    first: [1, 1]
  geo:
    scale: 16000 # ~10 miles per hex
    projection: mercator

terrain:
  hex:
    clear:
      style: { color: "#ffffff" }
    forest:
      properties: { defense: 2, move_cost: 2 }
      style: { color: "#aaddaa" }
    swamp:
      properties: { defense: 2, move_cost: 3 }
      style: { color: "#cccc88" }
    city:
      properties: { defense: 3, move_cost: 1 } # Road bonus usually applies
      style: { color: "#888888" }
    major_city:
      properties: { defense: 4, move_cost: 1, supply_source: true }
      style: { color: "#444444" }
  
  edge:
    river:
      style: { stroke: "#4444ff", stroke_width: 3 }
  
  path:
    road:
      style: { stroke: "#666666", stroke_width: 2 }
    railroad:
      style: { stroke: "#000000", stroke_width: 2, pattern: "dashed" }

defaults:
  hex:
    terrain: clear
    elevation: 0

features:
  # Map Shape (Exclude non-existent hexes in 14x11 grid)
  # Even columns (2,4...) only go to row 10.
  - hexes:
      exclude: ["0211", "0411", "0611", "0811", "1011", "1211", "1411"]
    terrain: "off_map" # Or just exclude from mesh entirely

  # === Cities ===

  - hexes: ["0105", "0205"]
    terrain: city
    label: "Smolensk"

  - hexes: ["0601", "0602"]
    terrain: city
    label: "Rzhev"

  - hexes: ["0603", "0604"]
    terrain: city
    label: "Vyazma"

  - hex: "0805"
    terrain: city
    label: "Kaluga"

  - hex: "0207"
    terrain: city
    label: "Roslavl"

  - hex: "0409"
    terrain: city
    label: "Bryansk"

  - hex: "0809"
    terrain: city
    label: "Orel"

  - hex: "1107"
    terrain: city
    label: "Tula"
    tags: [victory]

  - hex: "1406"
    terrain: city
    label: "Ryazan"

  - hexes: ["1301", "1401"]
    terrain: city
    label: "Kalinin"
    tags: [victory]

  - hexes: ["1202", "1203"]
    terrain: major_city
    label: "Moscow"
    tags: [victory]
    properties: { victory_points: 10 }

  # === Forests ===
  # Approximated based on map visual

  # North forests (around Rzhev/Kalinin)
  - hexes: 
      range: ["0101", "0502"]
    terrain: forest
    
  - hexes: ["0701", "0801", "0901", "1001", "1101"]
    terrain: forest

  # Central forests (Vyazma/Kaluga gap)
  - hexes: ["0302", "0402", "0403", "0502", "0503"]
    terrain: forest

  # Bryansk forests
  - hexes: ["0109", "0209", "0309", "0408", "0508"]
    terrain: forest

  # Tula woods
  - hexes: ["1007", "1008", "1108"]
    terrain: forest

  # === Rivers ===
  # Simplified paths for major rivers

  - edges:
      path: ["0104", "0204", "0304", "0404"]
    terrain: river
    label: "Dneiper"

  - edges:
      path: ["0605", "0705", "0805", "0905", "1006", "1106"]
    terrain: river
    label: "Oka"

  - edges:
      path: ["1002", "1102", "1202", "1303"]
    terrain: river
    label: "Volga" # Near Kalinin

  # === Roads and Railroads ===
  # Connecting the cities

  - path: ["0205", "0304", "0404", "0503", "0603" ]
    terrain: railroad
    label: "Smolensk-Vyazma Rail"

  - path: ["0603", "0703", "0803", "0902", "1002", "1102", "1202"]
    terrain: railroad
    label: "Vyazma-Moscow Rail"

  - path: ["0809", "0908", "1008", "1107"]
    terrain: railroad
    label: "Orel-Tula Rail"
    
  - path: ["1107", "1106", "1105", "1104", "1203"]
    terrain: railroad
    label: "Tula-Moscow Rail"

  - path: ["0409", "0508", "0607", "0706", "0805"]
    terrain: road
    label: "Bryansk-Kaluga Road"

  # === Regions / Setup Zones ===
  
  - region:
      id: german_setup
      hexes: { range: ["0101", "0411"] }
    label: "German Start Line"
    tags: [setup]
