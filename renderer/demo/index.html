<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HexMap Reference Implementation Demo</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        #app {
            display: flex;
            width: 100%;
        }

        .panel {
            flex: 1;
            position: relative;
            overflow: hidden;
            border-right: 1px solid #ccc;
        }

        #source-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0.5;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        #render-container {
            width: 100%;
            height: 100%;
            background: #f0f0f0;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 10px;
            z-index: 100;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="panel">
            <div id="render-container"></div>
            <img id="source-image" src="/battle-for-moscow-map-full.jpg" style="display:none;">
            <div id="controls">
                <label>
                    Overlay Image: <input type="checkbox" id="chk-overlay">
                </label>
                <br>
                <label>
                    Opacity: <input type="range" id="rng-opacity" min="0" max="1" step="0.1" value="0.5">
                </label>
            </div>
        </div>
    </div>
    <script type="module" src="./main.ts"></script>
</body>

</html>
