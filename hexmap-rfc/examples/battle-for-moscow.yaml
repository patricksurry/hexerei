hexmap: "1.0"

metadata:
  id: battle-for-moscow
  version: "1.0"
  title: "Battle for Moscow"
  designer: "Frank Chadwick"

grid:
  hex_top: flat
  columns: 22
  rows: 15
  stagger: low
  coordinates:
    label: XXYY
    origin: top-left
    first: [1, 1]
  geo:
    scale: 16000

terrain:
  hex:
    clear: {}
    forest: {}
    swamp: {}
    city: {}
    major_city: {}

  edge:
    river: {}

  path:
    road: {}
    railroad: {}

defaults:
  hex:
    terrain: clear
    elevation: 0

features:
  # === Terrain ===

  - hexes: ["0302", "0303", "0402"]
    terrain: forest

  - hex: "0912"
    terrain: city
    label: "Kaluga"

  - hex: "1205"
    terrain: city
    label: "Tula"
    tags: [victory]

  - hex: "1808"
    terrain: major_city
    label: "Moscow"
    tags: [victory]
    properties:
      victory_points: 3

  # === Rivers ===

  - edges: ["0910/NE", "0910/N", "0810/NE"]
    terrain: river

  # === Roads and Railroads ===

  - path: ["1508", "1608", "1708", "1808"]
    terrain: road
    id: moscow-highway
    label: "Moscow Highway"

  - path: ["1205", "1306", "1407", "1508", "1608"]
    terrain: railroad
    id: tula-rail

  # === Regions ===

  - region:
      id: soviet-fortifications
      hexes: ["0805", "0905", "1005", "1105"]
    tags: [fortified]
    label: "Soviet Fortification Line"

  - region:
      id: german-entry-west
      hexes: ["0101", "0102", "0103", "0104", "0105",
              "0106", "0107", "0108", "0109", "0110"]
    tags: [entry]
    label: "German Entry (West Edge)"
