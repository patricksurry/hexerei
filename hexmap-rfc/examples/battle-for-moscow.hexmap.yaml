hexmap: "1.0"

metadata:
  id: battle-for-moscow
  version: "1.2"
  title: "Battle for Moscow"
  description: "Introductory wargame representing the German advance on Moscow, 1941."
  designer: "Frank Chadwick"
  publisher: "GDW"
  date: "1986"
  source:
    url: "https://grognard.com/bfm/game.html"
    notes: "Based on the original GDW map and rules. Grid size 14x11."

grid:
  hex_top: flat
  # Staggered bottom edge: even columns only go to row 10.
  hexes: "0101 1401 1410 >N 0111 !"
  stagger: high # Odd columns (01, 03...) are shifted UP
  columns: 14
  rows: 11
  coordinates:
    label: CCRR
    origin: top-left
    first: [1, 1]
  geo:
    scale: 16000 # ~10 miles per hex
    projection: mercator

terrain:
  hex:
    clear:
      style: { color: "#ffffff" }
    forest:
      properties: { defense: 2, move_cost: 2 }
      style: { color: "#aaddaa" }
    swamp:
      properties: { defense: 2, move_cost: 3 }
      style: { color: "#cccc88" }
    city:
      properties: { defense: 3, move_cost: 1 }
      style: { color: "#888888" }
    major_city:
      properties: { defense: 4, move_cost: 1, supply_source: true }
      style: { color: "#444444" }
  
  edge:
    river:
      style: { stroke: "#4444ff", stroke_width: 3 }
    road:
      style: { stroke: "#666666", stroke_width: 2 }
    railroad:
      style: { stroke: "#000000", stroke_width: 2, pattern: "dashed" }

defaults:
  hex:
    terrain: clear
    elevation: 0

features:
  # === Cities ===

  - hexes: "0105 0205"
    terrain: city
    label: "Smolensk"

  - hexes: "0601 0602"
    terrain: city
    label: "Rzhev"

  - hexes: "0603 0604"
    terrain: city
    label: "Vyazma"

  - hexes: "0805"
    terrain: city
    label: "Kaluga"

  - hexes: "0207"
    terrain: city
    label: "Roslavl"

  - hexes: "0409"
    terrain: city
    label: "Bryansk"

  - hexes: "0809"
    terrain: city
    label: "Orel"

  - hexes: "1107"
    terrain: city
    label: "Tula"
    tags: [victory]

  - hexes: "1406"
    terrain: city
    label: "Ryazan"

  - hexes: "1301 1401"
    terrain: city
    label: "Kalinin"
    tags: [victory]

  - hexes: "1202 1203"
    terrain: major_city
    label: "Moscow"
    tags: [victory]
    properties: { victory_points: 10 }

  # === Forests ===

  - hexes: "0101 0501 0502 0102 !" # Rectangular-ish forest block
    terrain: forest
    
  - hexes: "0701 1101"
    terrain: forest

  - hexes: "0302 0402, 0403, 0502 0503"
    terrain: forest

  - hexes: "0109 0309, 0408 0508"
    terrain: forest

  - hexes: "1007 1008, 1108"
    terrain: forest

  # === Rivers ===

  - edges: "0104/N 0204/N 0304/N 0404/N"
    terrain: river
    label: "Dneiper"

  - edges: "0605/N 0705/N 0805/N 0905/N 1006/N 1106/N"
    terrain: river
    label: "Oka"

  - edges: "1002/N 1102/N 1202/N 1303/N"
    terrain: river
    label: "Volga"

  # === Roads and Railroads ===

  - edges: "0205 0304 0404 0503 0603"
    terrain: railroad
    label: "Smolensk-Vyazma Rail"

  - edges: "0603 1202"
    terrain: railroad
    label: "Vyazma-Moscow Rail"

  - edges: "0809 0908 1008 1107"
    terrain: railroad
    label: "Orel-Tula Rail"
    
  - edges: "1107 1106 1105 1104 1203"
    terrain: railroad
    label: "Tula-Moscow Rail"

  - edges: "0409 0508 0607 0706 0805"
    terrain: road
    label: "Bryansk-Kaluga Road"

  # === Setup Zones ===
  
  - id: german_setup
    hexes: "0101 0401 0411 0111 !"
    label: "German Start Line"
    tags: [setup]
