hexmap: "1.0"

metadata:
  id: battle-for-moscow
  version: "1.1"
  title: "Battle for Moscow"
  description: "Introductory wargame representing the German advance on Moscow, 1941."
  designer: "Frank Chadwick"
  publisher: "GDW"
  date: "1986"
  source:
    url: "https://grognard.com/bfm/game.html"
    notes: "Based on the original GDW map and rules. Grid size 14x11."

layout:
  orientation: flat-up
  label: XXYY
  origin: top-left
  # Simple rectangle 14x11, then subtract specific phantom hexes
  all: "0101 - 1401 - 1411 - 0111 fill exclude 0211, 0411, 0611, 0811, 1011, 1211, 1411"
  georef:
    scale: 16000 # ~10 miles per hex
    projection: mercator

terrain:
  hex:
    clear:
      style: { color: "#ffffff" }
    forest:
      properties: { defense: 2, move_cost: 2 }
      style: { color: "#aaddaa" }
    swamp:
      properties: { defense: 2, move_cost: 3 }
      style: { color: "#cccc88" }
    city:
      properties: { defense: 3, move_cost: 1 } # Road bonus usually applies
      style: { color: "#888888" }
    major_city:
      properties: { defense: 4, move_cost: 1, supply_source: true }
      style: { color: "#444444" }
  
  edge:
    river:
      style: { stroke: "#4444ff", stroke_width: 3 }
  
  path:
    road:
      style: { stroke: "#666666", stroke_width: 2 }
    railroad:
      style: { stroke: "#000000", stroke_width: 2, pattern: "dashed" }

features:
  # === Base Layer ===
  - at: "@all"
    terrain: clear
    elevation: 0

  # === Cities ===

  - at: "0105 0205"
    terrain: city
    label: "Smolensk"

  - at: "0601 0602"
    terrain: city
    label: "Rzhev"

  - at: "0603 0604"
    terrain: city
    label: "Vyazma"

  - at: "0805"
    terrain: city
    label: "Kaluga"

  - at: "0207"
    terrain: city
    label: "Roslavl"

  - at: "0409"
    terrain: city
    label: "Bryansk"

  - at: "0809"
    terrain: city
    label: "Orel"

  - at: "1107"
    terrain: city
    label: "Tula"
    tags: victory

  - at: "1406"
    terrain: city
    label: "Ryazan"

  - at: "1301 1401"
    terrain: city
    label: "Kalinin"
    tags: victory

  - at: "1202 1203"
    terrain: major_city
    label: "Moscow"
    tags: victory
    properties: { victory_points: 10 }

  # === Forests ===
  # North forests
  - at: "0101 - 0501 - 0502 - 0102 fill"
    terrain: forest
    
  - at: "0701 0801 0901 1001 1101"
    terrain: forest

  # Central forests
  - at: "0302 0402 0403 0502 0503"
    terrain: forest

  # Bryansk forests
  - at: "0109 0209 0309 0408 0508"
    terrain: forest

  # Tula woods
  - at: "1007 1008 1108"
    terrain: forest

  # === Rivers ===
  - at: "0104/N - 0204/N - 0304/N - 0404/N" 
    terrain: river
    label: "Dneiper"

  - at: "0605/N - 0705/N - 0805/N - 0905/N - 1006/N - 1106/N"
    terrain: river
    label: "Oka"

  - at: "1002/N - 1102/N - 1202/N - 1303/N"
    terrain: river
    label: "Volga"

  # === Roads and Railroads ===
  - at: "0205 - 0304 - 0404 - 0503 - 0603"
    terrain: railroad
    label: "Smolensk-Vyazma Rail"

  - at: "0603 - 0703 - 0803 - 0902 - 1002 - 1102 - 1202"
    terrain: railroad
    label: "Vyazma-Moscow Rail"

  - at: "0809 - 0908 - 1008 - 1107"
    terrain: railroad
    label: "Orel-Tula Rail"
    
  - at: "1107 - 1106 - 1105 - 1104 - 1203"
    terrain: railroad
    label: "Tula-Moscow Rail"

  - at: "0409 - 0508 - 0607 - 0706 - 0805"
    terrain: road
    label: "Bryansk-Kaluga Road"

  # === Regions / Setup Zones ===
  
  - id: german_setup
    at: "0101 - 0401 - 0411 - 0111 fill"
    label: "German Start Line"
    tags: setup
