hexmap: "1.0"

metadata:
  id: battle-for-moscow
  version: "1.2"
  title: "Battle for Moscow"
  description: "Re-creation of Battle for Moscow based on the bfm.md experiment."
  designer: "Frank Chadwick"
  publisher: "Game Designers' Workshop"
  date: "1986"
  source:
    url: "https://grognard.com/bfm/game.html"
    notes: "Coordinates 1701-3010 as per bfm.md"

layout:
  orientation: flat-up
  columns: 14
  rows: 10
  coordinates:
    label: XXYY
    first: [17, 1]
  all: "1701 3001 3010 1710 !"
  georef:
    scale: 16000

terrain:
  hex:
    clear: { name: "Plain", style: { color: "#D9E3C8" } }
    forest: { name: "Forest", style: { color: "#93A877" } }
    city: { name: "City", style: { color: "#AAA" } }
    major_city: { name: "Major City", style: { color: "#888" } }
    german_setup: { name: "German Setup", style: { color: "#D9E3C8" } }
    russian_setup: { name: "Russian Setup", style: { color: "#D9E3C8" } }
    fortification: { name: "Fortification", style: { color: "#C8D3B8" } }
  edge:
    river: { name: "River", style: { color: "#88AADD" } }
    fortification: { name: "Fortification", style: { color: "#444" } }
  path:
    railroad: { name: "Railroad", style: { color: "#333" } }

defaults:
  hex:
    terrain: clear

features:
  - at: "@all"
    terrain: clear

  # === Major Cities ===
  - at: "2703"
    terrain: major_city
    label: "Moscow"
    tags: victory

  # === Cities ===
  - at: "2201"
    terrain: city
    label: "Rzhev"
  - at: "1804"
    terrain: city
    label: "Smolensk"
  - at: "2203"
    terrain: city
    label: "Vyazma"
  - at: "2403"
    terrain: city
    label: "Mozhaisk"
  - at: "1907"
    terrain: city
    label: "Roslavl"
  - at: "2109"
    terrain: city
    label: "Bryansk"
  - at: "2405"
    terrain: city
    label: "Kaluga"
  - at: "2409"
    terrain: city
    label: "Orel"
  - at: "2707"
    terrain: city
    label: "Tula"
  - at: "3005"
    terrain: city
    label: "Ryazan"

  # === Railroads ===
  # 1702-Rzhev-Moscow
  - at: "1702 2201 2703"
    terrain: railroad
    label: "Northern Rail"
  
  # Smolensk-Vyazma-Rzhev
  - at: "1804 1905 2203 2201"
    terrain: railroad

  # Vyazma-Mozhaisk-Moscow
  - at: "2203 2303 2403 2703"
    terrain: railroad

  # Moscow-Ryazan-3006/SE
  - at: "2703 3005 3006"
    terrain: railroad

  # Moscow-Tula-Orel-2410
  - at: "2703 2707 2409 2410"
    terrain: railroad

  # === Rivers ===
  # 1706/N-2004/SE...
  - at: "1706/N 2004/SE 2103/SE"
    terrain: river

  # 2105/S-2203/N-2406/NE-2509/NE-2510/SE
  - at: "2105/S 2203/N 2406/NE 2509/NE 2510/SE"
    terrain: river

  # === Fortifications ===
  # Vyazma Defense Line
  - id: vyazma-defense
    at: "2101 2102 2103 2104 2105 2106 2107"
    terrain: fortification
    label: "Vyazma Defense Line"

  # Mozhaisk Defense Line
  - id: mozhaisk-defense
    at: "2401 2402 2403 2404 2405" # 2401-Kaluga
    terrain: fortification
